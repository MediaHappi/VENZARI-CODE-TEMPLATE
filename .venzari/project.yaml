# VENZARI CODE project configuration
# Generated by: venzari-code install
# Edit this file to customize your project's governance settings.

project:
  name: "[FILL IN: project name]"
  description: "[FILL IN: what this project does]"
  owner: "[FILL IN: github username or org]"
  repo: "[FILL IN: github.com/owner/repo]"

# Governance settings
governance:
  # Maximum tool calls per session before loop detection triggers
  max_loop_iterations: 10
  # Require evidence before task completion
  require_evidence: true
  # Minimum evidence events required
  min_evidence_events: 3
  # Block commits with secrets
  secret_scan: true

# Mode permissions — which tools are allowed in each mode
modes:
  discover:
    allowed_tools: [read, search, list, grep, glob]
  plan:
    allowed_tools: [read, search, list, grep, glob, write_plan]
  implement:
    allowed_tools: [read, write, search, shell, grep, glob]
  validate:
    allowed_tools: [read, shell, grep]
  review:
    allowed_tools: [read, grep, glob]
  commit:
    allowed_tools: [shell]

# Skill tracking — roles that earn skills on task completion
skills:
  enabled: true
  roles:
    - implement
    - test
    - review
    - devops
    - docs

# Handoff settings
handoffs:
  auto_write: true
  dir: ".venzari/handoffs"
  max_kept: 20
